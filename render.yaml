services:
  - type: web
    name: webmedia-xhs-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: LOG_LEVEL
        value: info
      - key: XHS_API_TOKEN
        sync: false
      - key: XHS_COOKIE
        sync: false
      - key: XHS_PROXY
        sync: false
      - key: XHS_IMAGE_FORMAT
        value: PNG
